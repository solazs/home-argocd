apiVersion: "cilium.io/v2alpha1"
kind: CiliumLoadBalancerIPPool
metadata:
  name: "home-network-pool"
spec:
  blocks:
    - cidr: "192.168.13.232/29"
---
apiVersion: "cilium.io/v2alpha1"
kind: CiliumL2AnnouncementPolicy
metadata:
  name: vlan13-announcement-policy
spec:
  nodeSelector:
    matchLabels: {}
  serviceSelector:
    matchLabels: {}
  interfaces:
    - "^vlan13-home$"
  loadBalancerIPs: true
