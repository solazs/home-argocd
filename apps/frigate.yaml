# IoT VLAN Network Attachment
apiVersion: "k8s.cni.cncf.io/v1"
kind: NetworkAttachmentDefinition
metadata:
  name: vlan12-iot
  namespace: frigate
spec:
  config: '{
    "cniVersion": "0.3.1",
    "type": "macvlan",
    "master": "vlan12-iot",
    "mode": "bridge",
    "ipam": {
    "type": "static",
    "addresses": [
    {
    "address": "192.168.12.151/24"
    }
    ]
    }
    }'
---
# Video VLAN Network Attachment
apiVersion: "k8s.cni.cncf.io/v1"
kind: NetworkAttachmentDefinition
metadata:
  name: vlan55-video
  namespace: frigate
spec:
  config: '{
    "cniVersion": "0.3.1",
    "type": "macvlan",
    "master": "vlan55-video",
    "mode": "bridge",
    "ipam": {
    "type": "static",
    "addresses": [
    {
    "address": "192.168.55.151/24"
    }
    ]
    }
    }'
---
# Frigate ArgoCD Application
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: frigate
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://blakeblackshear.github.io/blakeshome-charts/
    targetRevision: "7.8.0"
    chart: frigate
    helm:
      values: |
        image:
          tag: "0.17.1"

        securityContext:
          capabilities:
            add:
              - PERFMON # Required for Intel GPU performance monitoring

        # Multus network annotations to attach the secondary interfaces with STATIC MACs
        podAnnotations:
          k8s.v1.cni.cncf.io/networks: |-
            [
              {
                "name": "vlan12-iot",
                "mac": "02:F8:16:A7:E0:12" 
              },
              {
                "name": "vlan55-video",
                "mac": "02:F8:16:A7:E0:55"
              }
            ]
          
        # Map secrets to environment variables for use in the Frigate config
        envFromSecrets:
          - frigate-secrets

        # Hardware Acceleration for ffmpeg
        ffmpeg:
          hwaccel_args: preset-vaapi

        persistence:
          media:
            enabled: true
            existingClaim: frigate-media
          config:
            enabled: true
            existingClaim: frigate-config
            # ephemeralWritableConfigYaml defaults to true: init container seeds config from
            # Helm values on every pod restart. UI edits persist between restarts but are
            # reset on restart. To permanently save UI changes, update the config: block below.

        config: |
          mqtt:
            enabled: true
            host: 192.168.13.200
            port: 1883
            user: frigate
            password: "{FRIGATE_MQTT_PASSWORD}"

          go2rtc:
            streams:
              hik_utca_main:
                - rtsp://{FRIGATE_CAMERA_USER}:{FRIGATE_CAMERA_PASSWORD}@192.168.55.101:554/Streaming/Channels/101
              hik_utca_sub:
                - rtsp://{FRIGATE_CAMERA_USER}:{FRIGATE_CAMERA_PASSWORD}@192.168.55.101:554/Streaming/Channels/102

          detectors:
            ov_gpu:
              type: openvino
              device: GPU
            ov_npu:
              type: openvino
              device: NPU
          
          model:
            width: 300
            height: 300
            input_tensor: nhwc
            input_pixel_format: bgr
            path: /openvino-model/ssdlite_mobilenet_v2.xml
            labelmap_path: /openvino-model/coco_91cl_bkgr.txt

          cameras:
            hik_utca:
              ffmpeg:
                inputs:
                  - path: rtsp://127.0.0.1:8554/hik_utca_sub
                    input_args: preset-rtsp-restream
                    roles:
                      - detect
                  - path: rtsp://127.0.0.1:8554/hik_utca_main
                    input_args: preset-rtsp-restream
                    roles:
                      - record
              detect:
                enabled: true
                width: 1280
                height: 720
                fps: 5
              record:
                enabled: true
                motion:
                  days: 7
                alerts:
                  retain:
                    days: 14
                    mode: all
                detections:
                  retain:
                    days: 14
                    mode: all
              snapshots:
                enabled: true
                retain:
                  default: 14
              objects:
                track:
                  - person
                  - car
            
        tolerations:
          - key: "intel.feature.node.kubernetes.io/gpu"
            operator: "Exists"
            effect: "NoSchedule"
          - key: "intel.feature.node.kubernetes.io/npu"
            operator: "Exists"
            effect: "NoSchedule"
        nodeSelector:
          intel.feature.node.kubernetes.io/gpu: "true"
          intel.feature.node.kubernetes.io/npu: "true" # Request the NPU resource so the operator mounts /dev/accel/accel0
        resources:
          requests:
            npu.intel.com/accel: "1"
            gpu.intel.com/i915: "1"
          limits:
            npu.intel.com/accel: "1"
            gpu.intel.com/i915: "1"
  destination:
    server: https://kubernetes.default.svc
    namespace: frigate
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
# Static PV for Frigate media — references logos/frigate/media ZFS dataset
apiVersion: v1
kind: PersistentVolume
metadata:
  name: frigate-media
spec:
  capacity:
    storage: 1Ti
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: democratic-csi-logos-nfs-media
  mountOptions:
    - noatime
    - nfsvers=4.2
  csi:
    driver: org.democratic-csi.nfs-logos
    fsType: nfs
    volumeHandle: logos/frigate/media
    volumeAttributes:
      node_attach_driver: nfs
      provisioner_driver: zfs-generic-nfs
      server: 192.168.13.100
      share: /logos/frigate/media
  claimRef:
    namespace: frigate
    name: frigate-media
---
# Static PV for Frigate config — references logos/frigate/config ZFS dataset
apiVersion: v1
kind: PersistentVolume
metadata:
  name: frigate-config
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: democratic-csi-logos-nfs-media
  mountOptions:
    - noatime
    - nfsvers=4.2
  csi:
    driver: org.democratic-csi.nfs-logos
    fsType: nfs
    volumeHandle: logos/frigate/config
    volumeAttributes:
      node_attach_driver: nfs
      provisioner_driver: zfs-generic-nfs
      server: 192.168.13.100
      share: /logos/frigate/config
  claimRef:
    namespace: frigate
    name: frigate-config
---
# Static PVC for Frigate media
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: frigate-media
  namespace: frigate
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: democratic-csi-logos-nfs-media
  volumeName: frigate-media
  resources:
    requests:
      storage: 1Ti
---
# Static PVC for Frigate config
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: frigate-config
  namespace: frigate
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: democratic-csi-logos-nfs-media
  volumeName: frigate-config
  resources:
    requests:
      storage: 1Gi
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frigate-route
  namespace: frigate
spec:
  parentRefs:
    - name: home-gateway
      namespace: envoy-gateway-system
  hostnames:
    - "frigate.home.solazs.hu"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frigate
          port: 5000
---
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TCPRoute
metadata:
  name: frigate-rtsp-route
  namespace: frigate
spec:
  parentRefs:
    - name: home-gateway
      namespace: envoy-gateway-system
      sectionName: rtsp-listener # Must match the listener name in your Gateway
  rules:
    - backendRefs:
        - name: frigate
          port: 8554
