  name: jellyseerr-config
  namespace: media
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-media
  volumeName: jellyseerr-config
  resources:
    requests:
      storage: 2Gi
---
# Shared data volume
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media-data
  namespace: media
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-media
  volumeName: media-data
  resources:
    requests:
      storage: 20Ti

---
# =============================================================================
# qBittorrent — Download client
# WebUI: port 8080 | Torrent listener: 6881
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: qbittorrent
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://bjw-s-labs.github.io/helm-charts/
    chart: app-template
    targetRevision: 4.6.2
    helm:
      valuesObject:
        defaultPodOptions:
          nodeSelector:
            kubernetes.io/hostname: carrier

        controllers:
          main:
            containers:
              main:
                image:
                  repository: lscr.io/linuxserver/qbittorrent
                  tag: "5.1.0"
                env:
                  PUID: "1000"
                  PGID: "1000"
                  TZ: Europe/Budapest
                  WEBUI_PORT: "8080"

        service:
          main:
            controller: main
            ports:
              http:
                port: 8080

        persistence:
          config:
            type: persistentVolumeClaim
            existingClaim: qbittorrent-config
            globalMounts:
              - path: /config
          data:
            type: persistentVolumeClaim
            existingClaim: media-data
            globalMounts:
              - path: /data

  destination:
    server: https://kubernetes.default.svc
    namespace: media
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: qbittorrent-route
  namespace: media
spec:
  parentRefs:
    - name: home-gateway
      namespace: envoy-gateway-system
  hostnames:
    - "qbittorrent.home.solazs.hu"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: qbittorrent
          port: 8080

