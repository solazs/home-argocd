# =============================================================================
# *Arr Media Stack — ArgoCD Applications
# =============================================================================
# All pods are pinned to node "carrier" (the only NVIDIA GPU node).
# Storage uses local PVs backed by the /tavern/cinem ZFS dataset on carrier.
#
# Directory layout expected on carrier:
#   /tavern/cinem/config/radarr/
#   /tavern/cinem/config/sonarr/
#   /tavern/cinem/config/prowlarr/
#   /tavern/cinem/config/qbittorrent/
#   /tavern/cinem/config/jellyfin/
#   /tavern/cinem/config/jellyseerr/
#   /tavern/cinem/data/downloads/
#   /tavern/cinem/data/movies/
#   /tavern/cinem/data/tv/
#
# Create these before syncing:
#   mkdir -p /tavern/cinem/config/{radarr,sonarr,prowlarr,qbittorrent,jellyfin,jellyseerr}
#   mkdir -p /tavern/cinem/data/{downloads,movies,tv}
#   chown -R 1000:1000 /tavern/cinem/config /tavern/cinem/data
# =============================================================================

# -----------------------------------------------------------------------------
# StorageClass — local NVMe/HDD volumes, no dynamic provisioner
# -----------------------------------------------------------------------------
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: local-media
provisioner: kubernetes.io/no-provisioner
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Retain

---
# =============================================================================
# Config PersistentVolumes (one per app, bound to carrier)
# =============================================================================

apiVersion: v1
kind: PersistentVolume
metadata:
  name: radarr-config
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-media
  local:
    path: /tavern/cinem/config/radarr
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - carrier
  claimRef:
    namespace: media
    name: radarr-config
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: sonarr-config
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-media
  local:
    path: /tavern/cinem/config/sonarr
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - carrier
  claimRef:
    namespace: media
    name: sonarr-config
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: prowlarr-config
spec:
  capacity:
    storage: 2Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-media
  local:
    path: /tavern/cinem/config/prowlarr
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - carrier
  claimRef:
    namespace: media
    name: prowlarr-config
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: qbittorrent-config
spec:
  capacity:
    storage: 2Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
