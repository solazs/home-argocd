        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - carrier
  claimRef:
    namespace: media
    name: qbittorrent-config
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: jellyfin-config
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-media
  local:
    path: /tavern/cinem/config/jellyfin
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - carrier
  claimRef:
    namespace: media
    name: jellyfin-config
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: jellyseerr-config
spec:
  capacity:
    storage: 2Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-media
