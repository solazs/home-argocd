---
# =============================================================================
# Jellyfin — Media server
# WebUI: port 8096
# Pinned to carrier for NVIDIA GTX 1060 6GB (CUDA 6.1, Pascal).
# runtimeClassName: nvidia enables GPU access via the NVIDIA GPU operator.
# Jellyfin library paths: /data/movies and /data/tv
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jellyfin
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://jellyfin.github.io/jellyfin-helm
    chart: jellyfin
    targetRevision: "3.2.0"
    helm:
      valuesObject:
        image:
          tag: "10.11.8"

        # Pin to carrier for NVIDIA GPU access
        nodeSelector:
          kubernetes.io/hostname: carrier

        # Enable NVIDIA runtime for GPU transcoding
        runtimeClassName: nvidia

        resources:
          requests:
            nvidia.com/gpu: "1"
          limits:
            nvidia.com/gpu: "1"

        persistence:
          config:
            enabled: true
            existingClaim: jellyfin-config

        # Mount the shared media-data volume at /data
        # Jellyfin libraries will be added as /data/movies and /data/tv
        extraVolumes:
          - name: media-data
            persistentVolumeClaim:
              claimName: media-data

        extraVolumeMounts:
          - name: media-data
            mountPath: /data

        # Disable built-in Ingress; we use Envoy Gateway HTTPRoute below
        ingress:
          enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: media
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: jellyfin-route
  namespace: media
spec:
  parentRefs:
    - name: home-gateway
      namespace: envoy-gateway-system
  hostnames:
    - "jellyfin.home.solazs.hu"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: jellyfin
          port: 8096

