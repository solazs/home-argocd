---
# =============================================================================
# Shared data PV — /tavern/cinem/data mounted as /data in all *arr + qBit pods
# RWO is fine: all pods are on the same node (carrier), multiple pods on one
# node can share an RWO volume.
# =============================================================================
apiVersion: v1
kind: PersistentVolume
metadata:
  name: media-data
spec:
  capacity:
    storage: 20Ti
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-media
  local:
    path: /tavern/cinem/data
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - carrier
  claimRef:
    namespace: media
    name: media-data

---
# =============================================================================
# Config PersistentVolumeClaims
# =============================================================================

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: radarr-config
  namespace: media
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-media
  volumeName: radarr-config
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
