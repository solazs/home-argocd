metadata:
  name: prowlarr-config
  namespace: media
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-media
  volumeName: prowlarr-config
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
